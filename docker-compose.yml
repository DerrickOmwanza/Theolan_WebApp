# Docker Compose for local development

version: "3.8"

services:
    # PostgreSQL Database
    postgres:
        image: postgres:16-alpine
        container_name: theolan-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: theolan_dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Redis Cache
    redis:
        image: redis:7-alpine
        container_name: theolan-redis
        ports:
            - "6379:6379"
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data

    # Backend API
    backend:
        build:
            context: ./backend
            target: development
        container_name: theolan-backend
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: postgres
            DB_PASSWORD: postgres
            DB_NAME: theolan_dev
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            NODE_ENV: development
            REDIS_HOST: redis
            REDIS_PORT: 6379
        ports:
            - "3001:3000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - ./backend:/app
            - /app/node_modules

    # Frontend (development)
    frontend:
        build:
            context: ./frontend
            target: development
        container_name: theolan-frontend
        environment:
            VITE_API_BASE_URL: http://localhost:3001/api/v1
        ports:
            - "5174:5173"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - /app/node_modules

volumes:
    postgres_data:
    redis_data:
